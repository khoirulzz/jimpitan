name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Inject Public Keys into .env
      run: |
        # We hardcode the Supabase URL and Anon Key because they are public frontend keys.
        echo "SUPABASE_URL=https://jswqjcigdqagvzxyggma.supabase.co" > .env
        echo "SUPABASE_ANON_KEY=sb_publishable_sBGYIzHY_6zS-U2404bEvw_QRAdZ3sv" >> .env

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Release APK)
      run: ./gradlew assembleRelease

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jimpitan-release-apk
        path: app/build/outputs/apk/release/app-release.apk

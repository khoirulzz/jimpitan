name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Inject Secrets into .env and Keystore
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -z "$SUPABASE_URL" ]; then
          echo "ERROR: SUPABASE_URL secret is empty or missing! Please add it to Repository Secrets."
          exit 1
        fi
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "ERROR: KEYSTORE_BASE64 secret is empty or missing!"
          exit 1
        fi
        echo "SUPABASE_URL=$SUPABASE_URL" > .env
        echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
        echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Release APK)
      run: ./gradlew assembleRelease

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jimpitan-release-apk
        path: app/build/outputs/apk/release/app-release.apk
